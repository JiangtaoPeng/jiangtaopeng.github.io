<header class="site-header">
  <div class="container">
    <nav class="nav-wrapper">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a></li>
        <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>关于</a></li>
        <li><a href="{{ '/tags/' | relative_url }}" {% if page.url contains '/tags' %}class="active"{% endif %}>标签</a></li>
        <li><a href="{{ '/archive/' | relative_url }}" {% if page.url contains '/archive' %}class="active"{% endif %}>归档</a></li>
      </ul>
      
      <div class="header-actions">
        <button class="theme-toggle" aria-label="Toggle theme" id="theme-toggle">
          <i class="fas fa-moon"></i>
        </button>
        <a href="{{ site.github }}" target="_blank" class="social-link" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>
      </div>
    </nav>
  </div>
</header>

<script>
  // Mobile menu toggle
  document.querySelector('.mobile-menu-toggle').addEventListener('click', function() {
    document.querySelector('.nav-links').classList.toggle('active');
  });
  
  // Theme toggle
  const themeToggle = document.getElementById('theme-toggle');
  const icon = themeToggle.querySelector('i');
  
  // Check for saved theme preference
  if (localStorage.getItem('theme') === 'dark' || 
      (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.classList.add('dark-theme');
    icon.classList.replace('fa-moon', 'fa-sun');
  }
  
  themeToggle.addEventListener('click', function() {
    document.body.classList.toggle('dark-theme');
    if (document.body.classList.contains('dark-theme')) {
      icon.classList.replace('fa-moon', 'fa-sun');
      localStorage.setItem('theme', 'dark');
    } else {
      icon.classList.replace('fa-sun', 'fa-moon');
      localStorage.setItem('theme', 'light');
    }
  });
</script>
