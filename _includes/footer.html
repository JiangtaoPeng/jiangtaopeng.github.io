<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-section">
        <h3>{{ site.title }}</h3>
        <p>{{ site.description }}</p>
      </div>
      
      <div class="footer-section">
        <h4>快速链接</h4>
        <ul>
          <li><a href="{{ '/' | relative_url }}">首页</a></li>
          <li><a href="{{ '/about/' | relative_url }}">关于</a></li>
          <li><a href="{{ '/archive/' | relative_url }}">归档</a></li>
          <li><a href="{{ '/feed.xml' | relative_url }}">RSS 订阅</a></li>
        </ul>
      </div>
      
      <div class="footer-section">
        <h4>联系方式</h4>
        <div class="social-links">
          {% if site.github %}
          <a href="{{ site.github }}" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
          {% endif %}
          {% if site.email %}
          <a href="mailto:{{ site.email }}" aria-label="Email"><i class="fas fa-envelope"></i></a>
          {% endif %}
          {% if site.twitter %}
          <a href="{{ site.twitter }}" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          {% endif %}
        </div>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. 使用 <a href="https://jekyllrb.com" target="_blank">Jekyll</a> 构建，托管于 <a href="https://pages.github.com" target="_blank">GitHub Pages</a>.</p>
    </div>
  </div>
</footer>
