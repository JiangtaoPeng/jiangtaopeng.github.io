# Green Healing Blog 🌿

title: Green Healing Blog
description: >-
  一个绿色治愈主题的个人博客，记录生活中的美好与宁静。
  A green healing themed personal blog.
baseurl: ""
url: "https://jiangtaopeng.github.io"

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 6
paginate_path: "/page/:num/"

# Author
author:
  name: Jiangtao Peng
  email: pengjtnina@gmail.com
  bio: "热爱生活，热爱自然，用文字记录每一个治愈的瞬间 🌱"
  avatar: "/assets/images/avatar.jpg"

# Social links
social:
  github: NinaPeng

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Collections
collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

